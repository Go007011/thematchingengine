<header class="navbar navbar-expand-lg navbar-dark navbar-overlap-shell d-print-none">
  <div class="container-xl">
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#dashboard-navbar"
      aria-controls="dashboard-navbar"
      aria-expanded="false"
      aria-label="Toggle dashboard navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <a class="navbar-brand navbar-brand-autodark pe-lg-4" href="{{ page | relative }}/dashboard/overview/index.html">
      <div class="brand-mark">TM</div>
      <div>
        <div class="brand-title">{{ site.title }}</div>
        <div class="brand-subtitle">Tabler shell ready</div>
      </div>
    </a>
    <div class="navbar-nav flex-row order-lg-last">
      <div class="nav-item d-flex align-items-center">
        <div class="navbar-shell-status">
          <div class="text-uppercase text-blue-200 small">Deployment readiness</div>
          <div class="fw-semibold text-white">Configured</div>
        </div>
      </div>
    </div>
    <div class="collapse navbar-collapse" id="dashboard-navbar">
      <ul class="navbar-nav">
        {% for item in menu %}
        {% assign key = item[0] %}
        {% assign entry = item[1] %}
        <li class="nav-item{% if key == menu_key %} active{% endif %}">
          <a class="nav-link module-nav-link" href="{{ page | relative }}/{{ entry.url }}" data-nav-link>
            <span class="nav-link-icon d-md-none d-lg-inline-block">
              {% include "ui/icon.html" icon=entry.icon %}
            </span>
            <span class="nav-link-title">{{ entry.title }}</span>
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</header>
